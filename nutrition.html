<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthetivolve - Nutrition Log</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Link to an icon library like Font Awesome for the + symbols -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="nutrition-container">
        <!-- Main Header & Totals Bar -->
        <header class="log-header">
            <a href="index.html" class="back-link">← Dashboard</a>
            <div class="date-navigator">
                <button id="prev-day-btn"><i class="fas fa-chevron-left"></i></button>
                <h2 id="current-date">Today</h2>
                <button id="next-day-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="totals-bar">
                <div class="total-item">
                    <span>Calories</span>
                    <strong id="total-calories">----</strong>
                </div>
                <div class="total-item">
                    <span>Protein</span>
                    <strong id="total-protein">---g</strong>
                </div>
                <div class="total-item">
                    <span>Carbs</span>
                    <strong id="total-carbs">---g</strong>
                </div>
                <div class="total-item">
                    <span>Fat</span>
                    <strong id="total-fat">---g</strong>
                </div>
            </div>
        </header>

        <!-- The main timeline where hourly blocks will be injected by JS -->
        <main id="timeline-container">
            <!-- 
                This container will be populated by nutrition.js.
                It will generate blocks like this for each hour:
                
                <div class="time-block" data-hour="8">
                    <div class="time-header">
                        <h3>8:00 AM</h3>
                        <button class="add-food-btn-sm" title="Add food to this hour"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="food-list">
                         ... logged food items for this hour will go here ...
                    </div>
                </div>
            -->
        </main>

        <!-- Floating Action Button to Add Food at Current Time -->
        <button id="fab-add-food" title="Add food at current time">
            <i class="fas fa-plus"></i>
        </button>

        <!-- Hidden Paste Bar -->
        <div id="paste-bar" class="hidden">
            <span id="paste-item-name">Item Copied!</span>
            <button id="paste-to-now-btn">Paste to Now</button>
            <button id="paste-to-today-btn">Paste to Today</button>
            <button id="cancel-paste-btn"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Modal for Searching and Logging Food -->
    <div id="add-food-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close-btn">×</button>
            <h2>Log Food</h2>

            <!-- Tab Navigation -->
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="my-foods-tab">My Foods</button>
                <button class="tab-btn" data-tab="online-search-tab">Online Search</button>
            </div>

            <!-- Tab Content Panels -->
            <div class="tab-content active" id="my-foods-tab">
                <input type="search" id="my-food-search-input" placeholder="Search your saved foods...">
                <ul id="my-food-search-results"></ul>
            </div>

            <div class="tab-content" id="online-search-tab">
                <input type="search" id="online-search-input" placeholder="Search Open Food Facts database...">
                <ul id="online-search-results"></ul>
            </div>
            
            <hr>
            <button id="open-create-food-modal-btn">Can't find it? Create New Food</button>
            
            <!-- This part appears after a food is selected from ANY source -->
            <div id="log-confirmation-section" class="hidden">
                <h3 id="selected-food-name"></h3>
                <div class="form-group">
                    <label for="log-quantity-input">Quantity</label>
                    <input type="number" id="log-quantity-input">
                    <span>grams</span>
                </div>
                <button id="log-food-btn">Log This Food</button>
            </div>
        </div>
    </div>

    <!-- Modal for Creating a New Food -->
    <div id="create-food-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close-btn" data-modal-id="create-food-modal">×</button>
            <h2>Create New Food</h2>
            <form id="create-food-form">
                <div class="form-group"><label>Name:</label><input type="text" id="food-name" required></div>
                <div class="form-group"><label>Serving Size (g):</label><input type="number" id="food-serving" value="100" required></div>
                <div class="form-group"><label>Calories:</label><input type="number" id="food-calories" required></div>
                <div class="form-group"><label>Protein (g):</label><input type="number" id="food-protein" required></div>
                <div class="form-group"><label>Carbs (g):</label><input type="number" id="food-carbs" required></div>
                <div class="form-group"><label>Fat (g):</label><input type="number" id="food-fat" required></div>
                <div class="form-group">
                    <label>Processing Level:</label>
                    <select id="food-processing">
                        <option value="1">1: Raw/Whole</option>
                        <option value="2">2: Minimally Processed</option>
                        <option value="3" selected>3: Moderately Processed</option>
                        <option value="4">4: Highly Processed</option>
                        <option value="5">5: Ultra-Processed</option>
                    </select>
                </div>
                <button type="submit">Create Food</button>
            </form>
        </div>
    </div>

    <script src="js/nutrition.js"></script>
</body>
</html>
