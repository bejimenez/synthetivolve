<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthetivolve - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>Synthetivolve</h1>
            <p>Your Personalized Health & Wellness Engine</p>
        </header>

        <main class="dashboard-grid">
            
            <div class="dashboard-card card-large">
                <h3>Quick Stats</h3>
                <div class="stats-container">
                    <div class="stat-item">
                        <span class="stat-label">Current Weight</span>
                        <span class="stat-value">--.- lbs</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Target Calories</span>
                        <span class="stat-value">----</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Protein Target</span>
                        <span class="stat-value">--- g</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <h3>Modules</h3>
                <div class="nav-buttons">
                    <a href="calculator.html" class="nav-button">Calorie Calculator</a>
                    <a href="#" class="nav-button disabled">Nutrition Logger</a>
                    <a href="#" class="nav-button disabled">Training Log</a>
                    <a href="#" class="nav-button disabled">Biometrics</a>
                </div>
            </div>

            <div class="dashboard-card">
                <h3>Trends</h3>
                <div class="chart-placeholder">
                    [ Chart: Weekly Weight Trend ]
                </div>
            </div>

            <div class="dashboard-card">
                <h3>Today's Log</h3>
                <div class="log-actions">
                    <p>What would you like to log?</p>
                    <button class="log-button">Log Food</button>
                    <button class="log-button">Log Workout</button>
                </div>
            </div>

        </main>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
